# ============================================================
# weights.cfg — Instruction Category Weights
#
# Used by WeightedInstFreq LLVM pass via -weight-file option.
#
# Format:   Category=Weight
# Rules:
#   - Lines starting with # are comments (ignored)
#   - Empty lines are ignored
#   - Unknown categories produce a warning and are skipped
#   - Weights must be non-negative numbers (int or float)
#
# Higher weight = more "expensive" instruction category.
# ============================================================

# Arithmetic: add, sub, mul, div, rem (integer & float)
# Cost is low for integer; keep weight at 1 unless profiling floats
Arithmetic=1

# Memory: alloca, load, store, getelementptr
# Memory ops are significantly more expensive due to cache effects
Memory=3

# Control Flow: br, switch, ret, unreachable
# Branches cause pipeline stalls and prediction overhead
ControlFlow=1

# Call: call, invoke, callbr
# Function calls are the most expensive due to stack frame setup,
# register save/restore, and potential cache misses
Call=5

# Cast: trunc, zext, sext, bitcast, ptrtoint, inttoptr, etc.
# Usually free or very cheap on modern hardware (register rename)
Cast=1

# Comparison: icmp, fcmp
# Cheap on most architectures
Comparison=1

# Other: phi, select, extractvalue, insertvalue, etc.
Other=1